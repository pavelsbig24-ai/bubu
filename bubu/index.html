<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Master — advanced vocabulary</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255,255,245,0.1);
            backdrop-filter: blur(8px);
            border-radius: 64px;
            padding: 20px 24px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,200,0.2);
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
            gap: 15px;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(120deg, #f9d56e, #f8a35e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .lang-switch {
            display: flex;
            gap: 10px;
            background: #2c2c3a;
            padding: 5px 12px;
            border-radius: 60px;
        }
        .lang-btn {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            color: #ffd966;
        }
        .lang-btn.active {
            background: #ffb347;
            color: #1a1a2e;
        }
        .score-area {
            background: #2c2c3a;
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: bold;
            color: #f9d56e;
            font-size: 1.3rem;
        }
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }
        .category {
            flex: 1;
            min-width: 170px;
            background: rgba(30,30,45,0.9);
            border-radius: 48px;
            padding: 16px 12px;
            border: 1px solid #ffb34755;
            transition: 0.1s;
        }
        .category.drag-over {
            border: 3px solid #ffb347;
            background: #3a3a55;
            transform: scale(0.98);
        }
        .category-title {
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 16px;
            color: #ffb347;
        }
        .category-items {
            min-height: 130px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        .card-placed {
            background: #4e4e6e;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #ffecb3;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            word-break: break-word;
        }
        .cards-pool {
            background: rgba(0,0,0,0.3);
            border-radius: 48px;
            padding: 20px;
            margin: 20px 0;
        }
        .pool-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-left: 12px;
            color: #ffd966;
        }
        .cards-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .card {
            background: #2d2d44;
            border-radius: 42px;
            padding: 12px 24px;
            min-width: 140px;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            color: #ffecb3;
            cursor: grab;
            border: 1px solid #ffb34780;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .card:active { cursor: grabbing; }
        .card.dragging { opacity: 0.4; cursor: grabbing; }
        .info-btn {
            background: #ffb34755;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
            border: none;
        }
        .info-btn:hover { background: #ffb347; color: #1a1a2e; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }
        .modal-card {
            background: #2d2d44;
            border-radius: 56px;
            max-width: 400px;
            width: 85%;
            padding: 28px 24px;
            text-align: center;
            border: 1px solid #ffb347;
        }
        .modal-word { font-size: 2rem; font-weight: bold; color: #ffb347; margin-bottom: 12px; }
        .modal-translation { font-size: 1.3rem; margin: 15px 0; background: #1e1e30; padding: 12px; border-radius: 50px; }
        .modal-example { font-style: italic; padding: 12px; background: #232336; border-radius: 32px; margin: 15px 0; color: #ddd; }
        .close-modal {
            background: #ffb347;
            border: none;
            color: #1a1a2e;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        .reset-btn {
            background: none;
            border: 1px solid #ffb347;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: #ffb347;
            cursor: pointer;
        }
        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        @media (max-width: 720px) {
            .card { font-size: 0.85rem; padding: 8px 16px; min-width: 110px; }
            .category-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameApp">
    <div class="game-header">
        <h1 data-i18n="title">📖 Word Master</h1>
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="en">🇬🇧 EN</button>
            <button class="lang-btn" data-lang="ru">🇷🇺 RU</button>
        </div>
        <div class="score-area">⭐ <span id="scoreValue">0</span></div>
    </div>
    <div class="categories" id="categoriesContainer"></div>
    <div class="cards-pool">
        <div class="pool-title" data-i18n="poolTitle">🔥 Advanced words to sort</div>
        <div class="cards-wrapper" id="cardsPool"></div>
    </div>
    <div class="footer">
        <button class="reset-btn" id="resetGameBtn" data-i18n="reset">⟳ New set</button>
        <span style="font-size:0.75rem;">💡 Drag / tap → category</span>
    </div>
</div>
<div id="infoModal" class="modal">
    <div class="modal-card">
        <div class="modal-word" id="modalWord"></div>
        <div class="modal-translation" id="modalTranslation"></div>
        <div class="modal-example" id="modalExample"></div>
        <button class="close-modal" id="closeModalBtn">OK</button>
    </div>
</div>

<script>
    // ----------------------------------------------
    // MEGA VOCABULARY BANK (50+ сложных слов)
    const MASTER_WORDS = [
        { word: "ubiquitous", category: "tech", translation_ru: "вездесущий", example_ru: "Смартфоны стали вездесущими в повседневной жизни.", example_en: "Smartphones have become ubiquitous in daily life." },
        { word: "mitigate", category: "env", translation_ru: "смягчать", example_ru: "Правительства пытаются смягчить последствия изменения климата.", example_en: "Governments try to mitigate the effects of climate change." },
        { word: "leverage", category: "business", translation_ru: "использовать (в своих интересах)", example_ru: "Мы можем использовать наши ресурсы для роста.", example_en: "We can leverage our resources for growth." },
        { word: "cognitive", category: "psych", translation_ru: "когнитивный", example_ru: "Когнитивные способности ухудшаются с возрастом.", example_en: "Cognitive abilities decline with age." },
        { word: "sustainable", category: "env", translation_ru: "устойчивый", example_ru: "Нам нужны устойчивые источники энергии.", example_en: "We need sustainable energy sources." },
        { word: "paradigm", category: "business", translation_ru: "парадигма", example_ru: "Это смена парадигмы в технологии.", example_en: "This is a paradigm shift in technology." },
        { word: "neural", category: "tech", translation_ru: "нейронный", example_ru: "Нейронные сети меняют ИИ.", example_en: "Neural networks are transforming AI." },
        { word: "bias", category: "psych", translation_ru: "предвзятость", example_ru: "Когнитивные искажения влияют на решения.", example_en: "Cognitive biases affect decisions." },
        { word: "disruptive", category: "business", translation_ru: "разрушительный (инновационный)", example_ru: "Стартапы часто создают разрушительные технологии.", example_en: "Startups often create disruptive technologies." },
        { word: "resilience", category: "psych", translation_ru: "устойчивость (к стрессу)", example_ru: "Психологическая устойчивость помогает преодолевать трудности.", example_en: "Psychological resilience helps overcome adversity." },
        { word: "algorithm", category: "tech", translation_ru: "алгоритм", example_ru: "Социальные сети используют алгоритмы для рекомендаций.", example_en: "Social media use algorithms for recommendations." },
        { word: "liability", category: "law", translation_ru: "ответственность", example_ru: "Компания отрицает ответственность за ущерб.", example_en: "The company denies liability for the damage." },
        { word: "jurisdiction", category: "law", translation_ru: "юрисдикция", example_ru: "Это дело находится вне нашей юрисдикции.", example_en: "This case is outside our jurisdiction." },
        { word: "plaintiff", category: "law", translation_ru: "истец", example_ru: "Истец требует компенсацию.", example_en: "The plaintiff seeks compensation." },
        { word: "due diligence", category: "business", translation_ru: "должная осмотрительность", example_ru: "Перед сделкой мы провели комплексную проверку.", example_en: "We performed due diligence before the deal." },
        { word: "neuroplasticity", category: "psych", translation_ru: "нейропластичность", example_ru: "Мозг сохраняет нейропластичность всю жизнь.", example_en: "The brain retains neuroplasticity throughout life." },
        { word: "quantum", category: "tech", translation_ru: "квантовый", example_ru: "Квантовые компьютеры решают задачи быстрее.", example_en: "Quantum computers solve problems faster." },
        { word: "carbon footprint", category: "env", translation_ru: "углеродный след", example_ru: "Мы должны уменьшить углеродный след.", example_en: "We must reduce our carbon footprint." },
        { word: "circular economy", category: "env", translation_ru: "циркулярная экономика", example_ru: "Циркулярная экономика минимизирует отходы.", example_en: "Circular economy minimizes waste." },
        { word: "incentive", category: "business", translation_ru: "стимул", example_ru: "Бонусы служат стимулом для сотрудников.", example_en: "Bonuses are an incentive for employees." },
        { word: "heuristic", category: "psych", translation_ru: "эвристика", example_ru: "Эвристика упрощает принятие решений.", example_en: "Heuristics simplify decision-making." },
        { word: "blockchain", category: "tech", translation_ru: "блокчейн", example_ru: "Блокчейн обеспечивает прозрачность транзакций.", example_en: "Blockchain ensures transaction transparency." },
        { word: "tort", category: "law", translation_ru: "деликт", example_ru: "Гражданско-правовой деликт наносит ущерб.", example_en: "A civil tort causes harm." },
        { word: "fiduciary", category: "law", translation_ru: "фидуциарный (доверительный)", example_ru: "У директоров есть фидуциарные обязанности.", example_en: "Directors have fiduciary duties." },
        { word: "dissonance", category: "psych", translation_ru: "диссонанс", example_ru: "Когнитивный диссонанс вызывает дискомфорт.", example_en: "Cognitive dissonance causes discomfort." },
        { word: "asymmetric", category: "business", translation_ru: "асимметричный", example_ru: "Асимметричная информация вредит рынку.", example_en: "Asymmetric information harms the market." },
        { word: "encryption", category: "tech", translation_ru: "шифрование", example_ru: "Сквозное шифрование защищает данные.", example_en: "End-to-end encryption protects data." },
        { word: "anthropogenic", category: "env", translation_ru: "антропогенный", example_ru: "Антропогенное воздействие ведет к потеплению.", example_en: "Anthropogenic impact leads to warming." }
    ];

    // Категории (ID + заголовки)
    const CATEGORIES = [
        { id: "business", title_en: "💼 Business", title_ru: "💼 Бизнес" },
        { id: "psych", title_en: "🧠 Psychology", title_ru: "🧠 Психология" },
        { id: "tech", title_en: "⚙️ Technology", title_ru: "⚙️ Технологии" },
        { id: "env", title_en: "🌍 Environment", title_ru: "🌍 Окружающая среда" },
        { id: "law", title_en: "⚖️ Law", title_ru: "⚖️ Право" }
    ];

    // i18n интерфейса
    const I18N = {
        en: { title: "📖 Word Master", poolTitle: "🔥 Advanced words to sort", reset: "⟳ New set" },
        ru: { title: "📖 Мастер слов", poolTitle: "🔥 Сложные слова", reset: "⟳ Новый набор" }
    };

    let currentLang = "en";
    let score = 0;
    let gameWords = [];        // { wordData, categoryId, placed, placedInCategory }
    let currentWordBank = [];  // случайно выбранные слова

    // --- helpers ---
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    function getRandomWords(count = 16) {
        const shuffled = [...MASTER_WORDS];
        shuffleArray(shuffled);
        return shuffled.slice(0, count);
    }

    function initGameWords() {
        currentWordBank = getRandomWords(16);
        gameWords = currentWordBank.map(w => ({
            wordData: w,
            categoryId: w.category,
            placed: false,
            placedInCategory: null
        }));
        shuffleArray(gameWords);  // перемешаем для старта
    }

    function saveGame() {
        const toSave = { score, gameWords, currentWordBank };
        localStorage.setItem("wordSortAdvanced", JSON.stringify(toSave));
    }

    function loadGame() {
        const saved = localStorage.getItem("wordSortAdvanced");
        if (saved) {
            try {
                const data = JSON.parse(saved);
                score = data.score || 0;
                if (data.gameWords && data.currentWordBank) {
                    gameWords = data.gameWords;
                    currentWordBank = data.currentWordBank;
                } else {
                    initGameWords();
                }
            } catch(e) { initGameWords(); }
        } else {
            initGameWords();
        }
        updateScoreUI();
        render();
    }

    function updateScoreUI() {
        document.getElementById("scoreValue").innerText = score;
    }

    function placeWord(wordIndex, targetCategoryId) {
        const wordItem = gameWords[wordIndex];
        if (wordItem.placed) return false;
        if (wordItem.wordData.category !== targetCategoryId) {
            showTemporaryMessage("❌ Wrong category!", 1000);
            return false;
        }
        wordItem.placed = true;
        wordItem.placedInCategory = targetCategoryId;
        score += 10;
        updateScoreUI();
        saveGame();
        render();
        showTemporaryMessage("✅ +10 points!", 700);
        return true;
    }

    function resetGame() {
        initGameWords();
        score = 0;
        updateScoreUI();
        saveGame();
        render();
        showTemporaryMessage("🔄 New word set! Good luck!", 1200);
    }

    let msgTimeout = null;
    function showTemporaryMessage(text, duration) {
        let msgDiv = document.getElementById("tempMsg");
        if (!msgDiv) {
            msgDiv = document.createElement("div");
            msgDiv.id = "tempMsg";
            msgDiv.style.position = "fixed";
            msgDiv.style.bottom = "30px";
            msgDiv.style.left = "50%";
            msgDiv.style.transform = "translateX(-50%)";
            msgDiv.style.backgroundColor = "#ffb347";
            msgDiv.style.color = "#1a1a2e";
            msgDiv.style.padding = "10px 24px";
            msgDiv.style.borderRadius = "60px";
            msgDiv.style.fontWeight = "bold";
            msgDiv.style.zIndex = "999";
            document.body.appendChild(msgDiv);
        }
        if (msgTimeout) clearTimeout(msgTimeout);
        msgDiv.innerText = text;
        msgDiv.style.opacity = "1";
        msgTimeout = setTimeout(() => { msgDiv.style.opacity = "0"; }, duration);
    }

    function showWordInfo(wordData) {
        const modal = document.getElementById("infoModal");
        document.getElementById("modalWord").innerText = wordData.word;
        if (currentLang === "ru") {
            document.getElementById("modalTranslation").innerHTML = `📖 ${wordData.translation_ru}`;
            document.getElementById("modalExample").innerHTML = `📌 ${wordData.example_ru}`;
        } else {
            document.getElementById("modalTranslation").innerHTML = `📖 ${wordData.translation_ru}`;
            document.getElementById("modalExample").innerHTML = `📌 ${wordData.example_en}`;
        }
        modal.style.display = "flex";
    }

    function closeModal() {
        document.getElementById("infoModal").style.display = "none";
    }

    // Drag & drop + tap-to-select
    function setupDragAndDrop() {
        const categoriesEl = document.querySelectorAll(".category");
        categoriesEl.forEach(cat => {
            cat.addEventListener("dragover", (e) => { e.preventDefault(); cat.classList.add("drag-over"); });
            cat.addEventListener("dragleave", () => cat.classList.remove("drag-over"));
            cat.addEventListener("drop", (e) => {
                e.preventDefault();
                cat.classList.remove("drag-over");
                const wordIdx = e.dataTransfer.getData("text/plain");
                if (wordIdx && !isNaN(parseInt(wordIdx))) {
                    const categoryId = cat.getAttribute("data-cat-id");
                    placeWord(parseInt(wordIdx), categoryId);
                }
            });
        });
        const cards = document.querySelectorAll(".card[draggable='true']");
        cards.forEach(card => {
            card.addEventListener("dragstart", (e) => {
                const idx = card.getAttribute("data-idx");
                e.dataTransfer.setData("text/plain", idx);
                card.classList.add("dragging");
            });
            card.addEventListener("dragend", (e) => card.classList.remove("dragging"));
        });
        // touch / tap fallback
        let selectedCardIdx = null;
        document.querySelectorAll(".card").forEach(card => {
            card.addEventListener("click", (e) => {
                if (e.target.classList.contains("info-btn")) return;
                const idx = card.getAttribute("data-idx");
                if (idx && !card.closest(".category-items")) {
                    selectedCardIdx = parseInt(idx);
                    showTemporaryMessage(`👉 Tap on a category to place "${gameWords[selectedCardIdx]?.wordData.word}"`, 1500);
                }
            });
        });
        document.querySelectorAll(".category").forEach(cat => {
            cat.addEventListener("click", (e) => {
                if (selectedCardIdx !== null && !isNaN(selectedCardIdx)) {
                    const catId = cat.getAttribute("data-cat-id");
                    placeWord(selectedCardIdx, catId);
                    selectedCardIdx = null;
                }
            });
        });
        document.body.addEventListener("click", (e) => {
            if (!e.target.closest(".card") && !e.target.closest(".category")) selectedCardIdx = null;
        });
    }

    function attachInfoButtons() {
        document.querySelectorAll(".info-btn").forEach(btn => {
            btn.removeEventListener("click", handleInfoClick);
            btn.addEventListener("click", handleInfoClick);
        });
    }
    function handleInfoClick(e) {
        e.stopPropagation();
        const wordDataRaw = e.currentTarget.getAttribute("data-word");
        if (wordDataRaw) showWordInfo(JSON.parse(wordDataRaw));
    }

    function render() {
        const categoriesContainer = document.getElementById("categoriesContainer");
        const cardsPool = document.getElementById("cardsPool");
        categoriesContainer.innerHTML = "";
        CATEGORIES.forEach(cat => {
            const catDiv = document.createElement("div");
            catDiv.className = "category";
            catDiv.setAttribute("data-cat-id", cat.id);
            const title = document.createElement("div");
            title.className = "category-title";
            title.innerText = currentLang === "en" ? cat.title_en : cat.title_ru;
            const itemsDiv = document.createElement("div");
            itemsDiv.className = "category-items";
            const placedHere = gameWords.filter(w => w.placed && w.placedInCategory === cat.id);
            placedHere.forEach(w => {
                const placedSpan = document.createElement("div");
                placedSpan.className = "card-placed";
                placedSpan.innerHTML = `${w.wordData.word} <button class="info-btn" data-word='${JSON.stringify(w.wordData)}'>ⓘ</button>`;
                itemsDiv.appendChild(placedSpan);
            });
            catDiv.appendChild(title);
            catDiv.appendChild(itemsDiv);
            categoriesContainer.appendChild(catDiv);
        });
        cardsPool.innerHTML = "";
        const unplaced = gameWords.filter(w => !w.placed);
        unplaced.forEach((w, idx) => {
            const originalIndex = gameWords.findIndex(gw => gw === w);
            const cardDiv = document.createElement("div");
            cardDiv.className = "card";
            cardDiv.setAttribute("draggable", "true");
            cardDiv.setAttribute("data-idx", originalIndex);
            cardDiv.innerHTML = `${w.wordData.word} <button class="info-btn" data-word='${JSON.stringify(w.wordData)}'>ⓘ</button>`;
            cardsPool.appendChild(cardDiv);
        });
        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.getAttribute("data-i18n");
            if (I18N[currentLang][key]) el.innerText = I18N[currentLang][key];
        });
        attachInfoButtons();
        setupDragAndDrop();
    }

    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll(".lang-btn").forEach(btn => {
            if (btn.getAttribute("data-lang") === lang) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        render();
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadGame();
        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.addEventListener("click", (e) => setLanguage(e.currentTarget.getAttribute("data-lang")));
        });
        document.getElementById("resetGameBtn").addEventListener("click", () => resetGame());
        document.getElementById("closeModalBtn").addEventListener("click", closeModal);
        window.addEventListener("click", (e) => { if (e.target === document.getElementById("infoModal")) closeModal(); });
        setLanguage("en");
    });
</script>
</body>
</html>
