<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💖 бубу & дуду Word Master 💖</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #ffe4ec 0%, #ffd0df 100%);
            font-family: 'Segoe UI', 'Quicksand', 'Poppins', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 240, 245, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 64px;
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.2);
            padding: 20px 24px 32px;
            border: 2px solid #ffb7c5;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
            gap: 15px;
        }
        h1 {
            font-size: 1.9rem;
            margin: 0;
            background: linear-gradient(135deg, #e8436e, #ff8fab);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .lang-switch {
            display: flex;
            gap: 10px;
            background: #ffeef4;
            padding: 5px 12px;
            border-radius: 60px;
        }
        .lang-btn {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            color: #d44c6e;
        }
        .lang-btn.active {
            background: #e8436e;
            color: white;
            box-shadow: 0 4px 10px #ff99bb;
        }
        .score-area {
            background: white;
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: bold;
            color: #e8436e;
            font-size: 1.3rem;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .shop-btn, .mygifts-btn {
            background: #ffd9e6;
            border: none;
            border-radius: 40px;
            padding: 6px 15px;
            font-size: 1rem;
            font-weight: bold;
            color: #e8436e;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .shop-btn:hover, .mygifts-btn:hover {
            background: #e8436e;
            color: white;
        }
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }
        .category {
            flex: 1;
            min-width: 170px;
            background: #fff0f5;
            border-radius: 48px;
            padding: 16px 12px;
            border: 2px solid #ffc0d0;
            transition: 0.1s;
        }
        .category.drag-over {
            border: 3px solid #ff8fab;
            background: #ffe0ec;
            transform: scale(0.98);
        }
        .category-title {
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 16px;
            color: #e8436e;
        }
        .category-items {
            min-height: 130px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        .card-placed {
            background: #ffe0ec;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #aa4a6e;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: inset 0 1px 3px #fff9, 0 2px 4px #ffb7c5;
        }
        .cards-pool {
            background: #fff5f8;
            border-radius: 48px;
            padding: 20px;
            margin: 20px 0;
        }
        .pool-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-left: 12px;
            color: #e8436e;
        }
        .cards-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 42px;
            padding: 12px 24px;
            min-width: 140px;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            color: #b84c6e;
            cursor: grab;
            border: 2px solid #ffb7c5;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 15px -5px #ffb7c5;
        }
        .card:active { cursor: grabbing; }
        .card.dragging { opacity: 0.4; cursor: grabbing; }
        .info-btn {
            background: #ffd9e6;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            color: #e8436e;
            border: none;
        }
        .info-btn:hover { background: #e8436e; color: white; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(232,67,110,0.4);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(6px);
        }
        .modal-card {
            background: #fff5f8;
            border-radius: 56px;
            max-width: 450px;
            width: 85%;
            padding: 28px 24px;
            text-align: center;
            border: 3px solid #ffb7c5;
        }
        .modal-word { font-size: 2rem; font-weight: bold; color: #e8436e; margin-bottom: 12px; }
        .modal-translation { font-size: 1.3rem; margin: 15px 0; background: #ffeef4; padding: 12px; border-radius: 50px; }
        .modal-example { font-style: italic; padding: 12px; background: #ffeef4; border-radius: 32px; margin: 15px 0; color: #aa4a6e; }
        .gift-image {
            max-width: 100%;
            border-radius: 32px;
            margin: 15px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .close-modal {
            background: #e8436e;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .reset-btn {
            background: none;
            border: 2px solid #ff99bb;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: #e8436e;
            cursor: pointer;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        @media (max-width: 720px) {
            .card { font-size: 0.85rem; padding: 8px 16px; min-width: 110px; }
            .category-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameApp">
    <div class="game-header">
        <h1 data-i18n="title">💖 бубу & дуду Word Master 💖</h1>
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="en">🇬🇧 EN</button>
            <button class="lang-btn" data-lang="ru">🇷🇺 RU</button>
        </div>
        <div class="score-area">
            ⭐ <span id="scoreValue">0</span>
            <button id="shopButton" class="shop-btn">🎁 Магазин</button>
            <button id="myGiftsButton" class="mygifts-btn">📸 Мои гифки</button>
        </div>
    </div>
    <div class="categories" id="categoriesContainer"></div>
    <div class="cards-pool">
        <div class="pool-title" data-i18n="poolTitle">✨✨ сложные слова, но ты справишься ✨✨</div>
        <div class="cards-wrapper" id="cardsPool"></div>
    </div>
    <div class="footer">
        <button class="reset-btn" id="resetGameBtn" data-i18n="reset">🔄 новый набор 💕</button>
        <span style="font-size:0.75rem;">💗 перетащи или нажми → категория</span>
    </div>
</div>

<!-- Модалка для информации о слове -->
<div id="infoModal" class="modal">
    <div class="modal-card">
        <div class="modal-word" id="modalWord"></div>
        <div class="modal-translation" id="modalTranslation"></div>
        <div class="modal-example" id="modalExample"></div>
        <button class="close-modal" id="closeModalBtn">💗 понял(а), бубу</button>
    </div>
</div>

<!-- Модалка для магазина (список гифок) -->
<div id="shopModal" class="modal">
    <div class="modal-card" style="max-width: 400px;">
        <h2 style="color:#e8436e;">🎁 Магазин гифок 🎁</h2>
        <div id="giftList"></div>
        <button class="close-modal" id="closeShopBtn">Закрыть</button>
    </div>
</div>

<!-- Модалка для моих гифок -->
<div id="myGiftsModal" class="modal">
    <div class="modal-card" style="max-width: 400px;">
        <h2 style="color:#e8436e;">📸 Мои гифки</h2>
        <div id="myGiftsList"></div>
        <button class="close-modal" id="closeMyGiftsBtn">Закрыть</button>
    </div>
</div>

<!-- Модалка для показа гифки -->
<div id="giftModal" class="modal">
    <div class="modal-card">
        <div id="giftContent"></div>
        <button class="close-modal" id="closeGiftBtn">💕 Обнять бубу</button>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // СЛОВАРЬ (сложные слова)
    const MASTER_WORDS = [
        { word: "ubiquitous", category: "tech", translation_ru: "вездесущий", example_ru: "Смартфоны вездесущи, как любовь бубу ❤️", example_en: "Smartphones are ubiquitous, like bubu's love ❤️" },
        { word: "mitigate", category: "env", translation_ru: "смягчать", example_ru: "Бубу смягчает любую ошибку и даёт второй шанс 💕", example_en: "Bubu mitigates any mistake and gives a second chance 💕" },
        { word: "leverage", category: "business", translation_ru: "использовать", example_ru: "Бубу использует свои уми-способности на полную 🥰", example_en: "Bubu leverages its cuteness to the max 🥰" },
        { word: "cognitive", category: "psych", translation_ru: "когнитивный", example_ru: "Твои когнитивные способности — умииии! 🧠💖", example_en: "Your cognitive skills are sooo cute! 🧠💖" },
        { word: "sustainable", category: "env", translation_ru: "устойчивый", example_ru: "Бубу хочет устойчивого будущего с обнимашками 🌍🤗", example_en: "Bubu wants a sustainable future with hugs 🌍🤗" },
        { word: "paradigm", category: "business", translation_ru: "парадигма", example_ru: "Ты меняешь парадигму — бубу ты умиииии!!!!!", example_en: "You change the paradigm — bubu you're sooo cute!!!!!" },
        { word: "neural", category: "tech", translation_ru: "нейронный", example_ru: "Твои нейронные сети работают на 💯 с бубу", example_en: "Your neural networks work at 💯 with bubu" },
        { word: "bias", category: "psych", translation_ru: "предвзятость", example_ru: "Никакой предвзятости, только сердечки 💗", example_en: "No bias, only hearts 💗" },
        { word: "disruptive", category: "business", translation_ru: "разрушительный", example_ru: "Твоя уми-сила разрушает скуку! 🚀💕", example_en: "Your cute power disrupts boredom! 🚀💕" },
        { word: "resilience", category: "psych", translation_ru: "устойчивость", example_ru: "Бубу обладает устойчивостью к грусти 🌈", example_en: "Bubu has resilience to sadness 🌈" },
        { word: "algorithm", category: "tech", translation_ru: "алгоритм", example_ru: "Алгоритм счастья: бубу + ты = ❤️❤️❤️", example_en: "Happiness algorithm: bubu + you = ❤️❤️❤️" },
        { word: "liability", category: "law", translation_ru: "ответственность", example_ru: "Бубу берёт ответственность за твою улыбку 😊", example_en: "Bubu takes liability for your smile 😊" },
        { word: "jurisdiction", category: "law", translation_ru: "юрисдикция", example_ru: "Это дело под юрисдикцией сердечек 💖", example_en: "This case is under the jurisdiction of hearts 💖" },
        { word: "plaintiff", category: "law", translation_ru: "истец", example_ru: "Истец требует бесконечных обнимашек 🤗", example_en: "The plaintiff demands endless hugs 🤗" },
        { word: "due diligence", category: "business", translation_ru: "должная осмотрительность", example_ru: "Бубу проявляет должную осмотрительность в любви 🕵️‍♀️💕", example_en: "Bubu shows due diligence in love 🕵️‍♀️💕" },
        { word: "neuroplasticity", category: "psych", translation_ru: "нейропластичность", example_ru: "Твоя нейропластичность учится быть ещё милее 🧠💕", example_en: "Your neuroplasticity learns to be even cuter 🧠💕" },
        { word: "quantum", category: "tech", translation_ru: "квантовый", example_ru: "Квантовый скачок счастья, когда ты рядом 💫", example_en: "Quantum leap of happiness when you're near 💫" },
        { word: "carbon footprint", category: "env", translation_ru: "углеродный след", example_ru: "Бубу уменьшает углеродный след любовью 🌱💚", example_en: "Bubu reduces carbon footprint with love 🌱💚" },
        { word: "circular economy", category: "env", translation_ru: "циркулярная экономика", example_ru: "Циркулярная экономика сердечек — бесконечная нежность ♻️❤️", example_en: "Circular economy of hearts — endless tenderness ♻️❤️" },
        { word: "incentive", category: "business", translation_ru: "стимул", example_ru: "Твоя улыбка — лучший стимул для бубу 🌟", example_en: "Your smile is the best incentive for bubu 🌟" },
        { word: "heuristic", category: "psych", translation_ru: "эвристика", example_ru: "Эвристика бубу: если грустно → обнимашки 💕", example_en: "Bubu's heuristic: if sad → hugs 💕" },
        { word: "blockchain", category: "tech", translation_ru: "блокчейн", example_ru: "Блокчейн наших сердец нерушим 🔗❤️", example_en: "The blockchain of our hearts is unbreakable 🔗❤️" },
        { word: "tort", category: "law", translation_ru: "деликт", example_ru: "Деликт — это когда забыли поцеловать бубу 😘💔", example_en: "Tort is when you forgot to kiss bubu 😘💔" }
    ];

    const CATEGORIES = [
        { id: "business", title_en: "💼 Business", title_ru: "💼 Бизнес" },
        { id: "psych", title_en: "🧠 Psychology", title_ru: "🧠 Психология" },
        { id: "tech", title_en: "⚙️ Technology", title_ru: "⚙️ Технологии" },
        { id: "env", title_en: "🌍 Environment", title_ru: "🌍 Окружающая среда" },
        { id: "law", title_en: "⚖️ Law", title_ru: "⚖️ Право" }
    ];

    // 🎁 МАГАЗИН ГИФОК (пока одна)
    const GIFTS = [
        { id: "kiss", name: "Поцелуй бубу и дуду", name_en: "Bubu & Dudu kiss", price: 50, gifFile: "bubu-dudu-kiss.gif", message_ru: "💋 бубу ты самая лучшая целовашка!!!!! ❤️❤️❤️", message_en: "💋 bubu you are the best kisser!!!!! ❤️❤️❤️" }
    ];

    // i18n
    const I18N = {
        en: { title: "💖 bubu & dudu Word Master 💖", poolTitle: "✨✨ hard words, but you got this ✨✨", reset: "🔄 new set 💕", shop: "🎁 Shop", mygifts: "📸 My GIFs" },
        ru: { title: "💖 бубу & дуду Word Master 💖", poolTitle: "✨✨ сложные слова, но ты справишься ✨✨", reset: "🔄 новый набор 💕", shop: "🎁 Магазин", mygifts: "📸 Мои гифки" }
    };

    let currentLang = "en";
    let stars = 0;
    let gameWords = [];
    let currentWordBank = [];
    let purchasedGifts = JSON.parse(localStorage.getItem("purchasedGifts_bubu")) || [];

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    function getRandomWords(count = 16) {
        const shuffled = [...MASTER_WORDS];
        shuffleArray(shuffled);
        return shuffled.slice(0, count);
    }

    function initGameWords() {
        currentWordBank = getRandomWords(16);
        gameWords = currentWordBank.map(w => ({
            wordData: w,
            categoryId: w.category,
            placed: false,
            placedInCategory: null
        }));
        shuffleArray(gameWords);
    }

    function saveGame() {
        localStorage.setItem("wordSortBubu", JSON.stringify({ stars, gameWords, currentWordBank, purchasedGifts }));
    }

    function loadGame() {
        const saved = localStorage.getItem("wordSortBubu");
        if (saved) {
            try {
                const data = JSON.parse(saved);
                stars = data.stars || 0;
                if (data.gameWords && data.currentWordBank) {
                    gameWords = data.gameWords;
                    currentWordBank = data.currentWordBank;
                } else initGameWords();
                if (data.purchasedGifts) purchasedGifts = data.purchasedGifts;
            } catch(e) { initGameWords(); }
        } else {
            initGameWords();
            stars = 0;
            purchasedGifts = [];
        }
        updateStarsUI();
        render();
    }

    function updateStarsUI() {
        document.getElementById("scoreValue").innerText = stars;
        const shopBtn = document.getElementById("shopButton");
        const mygiftsBtn = document.getElementById("myGiftsButton");
        if (shopBtn) shopBtn.innerHTML = currentLang === "en" ? "🎁 Shop" : "🎁 Магазин";
        if (mygiftsBtn) mygiftsBtn.innerHTML = currentLang === "en" ? "📸 My GIFs" : "📸 Мои гифки";
    }

    function placeWord(wordIndex, targetCategoryId) {
        const wordItem = gameWords[wordIndex];
        if (wordItem.placed) return false;
        if (wordItem.wordData.category !== targetCategoryId) {
            const hearts = "❤️💕💗💖".slice(0,3);
            showTemporaryMessage(`💔 буууууу ты ооочень уми, а игра сломалась? дай еще шанс! попробуй в другую категорию ${hearts}`, 3500);
            return false;
        }
        wordItem.placed = true;
        wordItem.placedInCategory = targetCategoryId;
        stars += 10;
        updateStarsUI();
        saveGame();
        render();
        const successMessages = [
            "🎉 бубу ты умиииии!!!!! +10 звёзд ❤️",
            "💖 ура! бубу гордится тобой! +10 💖",
            "🥰 правильно! ты просто умница! +10 🥰",
            "🌸 бубу обнимает! +10 🌸",
            "💗 идеально! ещё одна звездочка! +10 💗"
        ];
        const randomMsg = successMessages[Math.floor(Math.random() * successMessages.length)];
        showTemporaryMessage(randomMsg, 1500);
        return true;
    }

    function resetGame() {
        initGameWords();
        stars = 0;
        updateStarsUI();
        saveGame();
        render();
        showTemporaryMessage("✨ новый набор слов! удачи, бубу тебя любит ✨", 2000);
    }

    // Покупка подарка
    function buyGift(gift) {
        if (purchasedGifts.includes(gift.id)) {
            showTemporaryMessage(currentLang === "en" ? "💕 You already have this gift! 💕" : "💕 У тебя уже есть этот подарок! 💕", 2000);
            return;
        }
        if (stars < gift.price) {
            showTemporaryMessage(currentLang === "en" ? `😢 Not enough stars... need ${gift.price} ⭐` : `😢 Не хватает звёздочек... нужно ${gift.price} ⭐`, 2000);
            return;
        }
        stars -= gift.price;
        purchasedGifts.push(gift.id);
        updateStarsUI();
        saveGame();
        showGiftModal(gift);
    }

    // Показать гифку (просмотр)
    function showGiftModal(gift) {
        const modal = document.getElementById("giftModal");
        const content = document.getElementById("giftContent");
        const message = currentLang === "en" ? gift.message_en : gift.message_ru;
        const imgUrl = gift.gifFile;
        content.innerHTML = `
            <div style="margin-bottom: 10px;">
                <img src="${imgUrl}" alt="gift" class="gift-image" style="max-width:100%; border-radius: 32px;" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22200%22%20height%3D%22150%22%3E%3Crect%20width%3D%22200%22%20height%3D%22150%22%20fill%3D%22%23ffb7c5%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20fill%3D%22%23e8436e%22%3EGIF%20not%20found%3C%2Ftext%3E%3C%2Fsvg%3E';">
            </div>
            <div style="font-size: 1.3rem; margin: 15px 0; background: #ffeef4; padding: 12px; border-radius: 50px;">
                ${message}
            </div>
            <div style="font-size: 1.5rem;">❤️ 💕 💗</div>
        `;
        modal.style.display = "flex";
    }

    function closeGiftModal() {
        document.getElementById("giftModal").style.display = "none";
    }

    // Открыть магазин
    function openShop() {
        const modal = document.getElementById("shopModal");
        const giftListDiv = document.getElementById("giftList");
        if (!giftListDiv) return;
        let html = '<div style="display: flex; flex-direction: column; gap: 12px;">';
        GIFTS.forEach(gift => {
            const already = purchasedGifts.includes(gift.id);
            const name = currentLang === "en" ? gift.name_en : gift.name;
            const priceText = `${gift.price} ⭐`;
            const status = already ? (currentLang === "en" ? " ✅ Owned" : " ✅ Куплено") : "";
            html += `
                <div style="background: #ffeef4; border-radius: 32px; padding: 12px; display: flex; justify-content: space-between; align-items: center;">
                    <span><strong>${name}</strong><br><span style="font-size:0.8rem;">${priceText}${status}</span></span>
                    ${!already ? `<button class="buy-gift-btn" data-id="${gift.id}" style="background:#e8436e; border:none; color:white; border-radius: 40px; padding: 6px 15px; cursor:pointer;">${currentLang === "en" ? "Buy 💖" : "Купить 💖"}</button>` : '<span style="color:green;">✓</span>'}
                </div>
            `;
        });
        html += '</div>';
        giftListDiv.innerHTML = html;
        document.querySelectorAll(".buy-gift-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const giftId = btn.getAttribute("data-id");
                const gift = GIFTS.find(g => g.id === giftId);
                if (gift) {
                    buyGift(gift);
                    modal.style.display = "none";
                }
            });
        });
        modal.style.display = "flex";
    }

    function closeShopModal() {
        document.getElementById("shopModal").style.display = "none";
    }

    // Мои гифки (просмотр купленных)
    function openMyGifts() {
        const modal = document.getElementById("myGiftsModal");
        const listDiv = document.getElementById("myGiftsList");
        const purchased = GIFTS.filter(g => purchasedGifts.includes(g.id));
        if (purchased.length === 0) {
            listDiv.innerHTML = `<p style="color:#e8436e;">${currentLang === "en" ? "You haven't bought any GIFs yet 💕" : "Ты ещё не купила ни одной гифки 💕"}</p>`;
        } else {
            let html = '<div style="display: flex; flex-direction: column; gap: 15px;">';
            purchased.forEach(gift => {
                const name = currentLang === "en" ? gift.name_en : gift.name;
                html += `
                    <div style="background: #ffeef4; border-radius: 32px; padding: 12px; text-align: center;">
                        <div><strong>${name}</strong></div>
                        <button class="view-gift-btn" data-id="${gift.id}" style="background:#e8436e; border:none; color:white; border-radius: 40px; padding: 8px 20px; margin-top: 10px; cursor:pointer;">${currentLang === "en" ? "Watch 💖" : "Посмотреть 💖"}</button>
                    </div>
                `;
            });
            html += '</div>';
            listDiv.innerHTML = html;
            document.querySelectorAll(".view-gift-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const giftId = btn.getAttribute("data-id");
                    const gift = GIFTS.find(g => g.id === giftId);
                    if (gift) {
                        showGiftModal(gift);
                        modal.style.display = "none";
                    }
                });
            });
        }
        modal.style.display = "flex";
    }

    function closeMyGiftsModal() {
        document.getElementById("myGiftsModal").style.display = "none";
    }

    let msgTimeout = null;
    function showTemporaryMessage(text, duration) {
        let msgDiv = document.getElementById("tempMsg");
        if (!msgDiv) {
            msgDiv = document.createElement("div");
            msgDiv.id = "tempMsg";
            msgDiv.style.position = "fixed";
            msgDiv.style.bottom = "30px";
            msgDiv.style.left = "50%";
            msgDiv.style.transform = "translateX(-50%)";
            msgDiv.style.backgroundColor = "#e8436e";
            msgDiv.style.color = "white";
            msgDiv.style.padding = "14px 28px";
            msgDiv.style.borderRadius = "60px";
            msgDiv.style.fontWeight = "bold";
            msgDiv.style.zIndex = "999";
            msgDiv.style.boxShadow = "0 4px 15px rgba(0,0,0,0.2)";
            msgDiv.style.fontSize = "1rem";
            msgDiv.style.textAlign = "center";
            msgDiv.style.maxWidth = "80%";
            document.body.appendChild(msgDiv);
        }
        if (msgTimeout) clearTimeout(msgTimeout);
        msgDiv.innerText = text;
        msgDiv.style.opacity = "1";
        msgTimeout = setTimeout(() => { msgDiv.style.opacity = "0"; }, duration);
    }

    function showWordInfo(wordData) {
        const modal = document.getElementById("infoModal");
        document.getElementById("modalWord").innerText = wordData.word;
        if (currentLang === "ru") {
            document.getElementById("modalTranslation").innerHTML = `📖 ${wordData.translation_ru}`;
            document.getElementById("modalExample").innerHTML = `📌 ${wordData.example_ru}`;
        } else {
            document.getElementById("modalTranslation").innerHTML = `📖 ${wordData.translation_ru}`;
            document.getElementById("modalExample").innerHTML = `📌 ${wordData.example_en}`;
        }
        modal.style.display = "flex";
    }

    function closeInfoModal() {
        document.getElementById("infoModal").style.display = "none";
    }

    function setupDragAndDrop() {
        const categoriesEl = document.querySelectorAll(".category");
        categoriesEl.forEach(cat => {
            cat.addEventListener("dragover", (e) => { e.preventDefault(); cat.classList.add("drag-over"); });
            cat.addEventListener("dragleave", () => cat.classList.remove("drag-over"));
            cat.addEventListener("drop", (e) => {
                e.preventDefault();
                cat.classList.remove("drag-over");
                const wordIdx = e.dataTransfer.getData("text/plain");
                if (wordIdx && !isNaN(parseInt(wordIdx))) {
                    placeWord(parseInt(wordIdx), cat.getAttribute("data-cat-id"));
                }
            });
        });
        const cards = document.querySelectorAll(".card[draggable='true']");
        cards.forEach(card => {
            card.addEventListener("dragstart", (e) => {
                card.classList.add("dragging");
                e.dataTransfer.setData("text/plain", card.getAttribute("data-idx"));
            });
            card.addEventListener("dragend", (e) => card.classList.remove("dragging"));
        });
        let selectedCardIdx = null;
        document.querySelectorAll(".card").forEach(card => {
            card.addEventListener("click", (e) => {
                if (e.target.classList.contains("info-btn")) return;
                const idx = card.getAttribute("data-idx");
                if (idx && !card.closest(".category-items")) {
                    selectedCardIdx = parseInt(idx);
                    showTemporaryMessage(`👉 нажми на категорию для слова "${gameWords[selectedCardIdx]?.wordData.word}"`, 1500);
                }
            });
        });
        document.querySelectorAll(".category").forEach(cat => {
            cat.addEventListener("click", (e) => {
                if (selectedCardIdx !== null && !isNaN(selectedCardIdx)) {
                    placeWord(selectedCardIdx, cat.getAttribute("data-cat-id"));
                    selectedCardIdx = null;
                }
            });
        });
        document.body.addEventListener("click", (e) => {
            if (!e.target.closest(".card") && !e.target.closest(".category")) selectedCardIdx = null;
        });
    }

    function attachInfoButtons() {
        document.querySelectorAll(".info-btn").forEach(btn => {
            btn.removeEventListener("click", handleInfoClick);
            btn.addEventListener("click", handleInfoClick);
        });
    }
    function handleInfoClick(e) {
        e.stopPropagation();
        const raw = e.currentTarget.getAttribute("data-word");
        if (raw) showWordInfo(JSON.parse(raw));
    }

    function render() {
        const categoriesContainer = document.getElementById("categoriesContainer");
        const cardsPool = document.getElementById("cardsPool");
        categoriesContainer.innerHTML = "";
        CATEGORIES.forEach(cat => {
            const catDiv = document.createElement("div");
            catDiv.className = "category";
            catDiv.setAttribute("data-cat-id", cat.id);
            const title = document.createElement("div");
            title.className = "category-title";
            title.innerText = currentLang === "en" ? cat.title_en : cat.title_ru;
            const itemsDiv = document.createElement("div");
            itemsDiv.className = "category-items";
            const placedHere = gameWords.filter(w => w.placed && w.placedInCategory === cat.id);
            placedHere.forEach(w => {
                const span = document.createElement("div");
                span.className = "card-placed";
                span.innerHTML = `${w.wordData.word} <button class="info-btn" data-word='${JSON.stringify(w.wordData)}'>ⓘ</button>`;
                itemsDiv.appendChild(span);
            });
            catDiv.appendChild(title);
            catDiv.appendChild(itemsDiv);
            categoriesContainer.appendChild(catDiv);
        });
        cardsPool.innerHTML = "";
        const unplaced = gameWords.filter(w => !w.placed);
        unplaced.forEach(w => {
            const originalIndex = gameWords.findIndex(gw => gw === w);
            const cardDiv = document.createElement("div");
            cardDiv.className = "card";
            cardDiv.setAttribute("draggable", "true");
            cardDiv.setAttribute("data-idx", originalIndex);
            cardDiv.innerHTML = `${w.wordData.word} <button class="info-btn" data-word='${JSON.stringify(w.wordData)}'>ⓘ</button>`;
            cardsPool.appendChild(cardDiv);
        });
        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.getAttribute("data-i18n");
            if (I18N[currentLang][key]) el.innerText = I18N[currentLang][key];
        });
        attachInfoButtons();
        setupDragAndDrop();
    }

    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll(".lang-btn").forEach(btn => {
            if (btn.getAttribute("data-lang") === lang) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        updateStarsUI(); // обновит текст кнопок
        render();
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadGame();
        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.addEventListener("click", (e) => setLanguage(e.currentTarget.getAttribute("data-lang")));
        });
        document.getElementById("resetGameBtn").addEventListener("click", () => resetGame());
        document.getElementById("closeModalBtn").addEventListener("click", closeInfoModal);
        document.getElementById("closeShopBtn").addEventListener("click", closeShopModal);
        document.getElementById("closeGiftBtn").addEventListener("click", closeGiftModal);
        document.getElementById("closeMyGiftsBtn").addEventListener("click", closeMyGiftsModal);
        document.getElementById("shopButton").addEventListener("click", openShop);
        document.getElementById("myGiftsButton").addEventListener("click", openMyGifts);
        window.addEventListener("click", (e) => {
            if (e.target === document.getElementById("infoModal")) closeInfoModal();
            if (e.target === document.getElementById("shopModal")) closeShopModal();
            if (e.target === document.getElementById("giftModal")) closeGiftModal();
            if (e.target === document.getElementById("myGiftsModal")) closeMyGiftsModal();
        });
        setLanguage("ru"); // по умолчанию русский, но можно оставить en
    });
</script>
</body>
</html>
