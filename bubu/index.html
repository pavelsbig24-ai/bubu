<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Sort — learn & play</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* избегаем выделения при перетаскивании */
        }
        body {
            background: linear-gradient(135deg, #fef9f0 0%, #fee6f0 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 250, 245, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 64px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 20px 24px 32px;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
            gap: 15px;
        }
        h1 {
            font-size: 1.9rem;
            margin: 0;
            background: linear-gradient(120deg, #c85b7c, #f4a261);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .lang-switch {
            display: flex;
            gap: 10px;
            background: #ffe5f0;
            padding: 5px 12px;
            border-radius: 60px;
        }
        .lang-btn {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            color: #b5476e;
        }
        .lang-btn.active {
            background: #b5476e;
            color: white;
            box-shadow: 0 4px 10px rgba(181,71,110,0.3);
        }
        .score-area {
            background: white;
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: bold;
            color: #b5476e;
            font-size: 1.3rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }
        .category {
            flex: 1;
            min-width: 180px;
            background: rgba(255, 245, 240, 0.9);
            border-radius: 48px;
            padding: 16px 12px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
            border: 2px solid #ffcddc;
            transition: 0.1s;
        }
        .category.drag-over {
            border: 3px solid #f4a261;
            background: #fff2e6;
            transform: scale(0.98);
        }
        .category-title {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 16px;
            color: #b5476e;
            border-bottom: 2px dotted #fbc4d6;
            display: inline-block;
            width: 100%;
        }
        .category-items {
            min-height: 120px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        .card-placed {
            background: #f3d9e4;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #6b2e44;
            box-shadow: inset 0 1px 2px white, 0 2px 5px rgba(0,0,0,0.05);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .cards-pool {
            background: #fff5f0;
            border-radius: 48px;
            padding: 20px;
            margin: 20px 0;
        }
        .pool-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-left: 12px;
            color: #a5456a;
        }
        .cards-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 42px;
            padding: 12px 24px;
            min-width: 120px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c1a24;
            box-shadow: 0 12px 20px -8px rgba(0,0,0,0.15);
            cursor: grab;
            transition: 0.1s;
            border: 2px solid #fbc4d2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .card:active {
            cursor: grabbing;
        }
        .card.dragging {
            opacity: 0.4;
            cursor: grabbing;
        }
        .info-btn {
            background: #ffe0e8;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            color: #b5476e;
            transition: 0.1s;
            border: none;
        }
        .info-btn:hover {
            background: #b5476e;
            color: white;
        }
        /* модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(6px);
        }
        .modal-card {
            background: #fff8fa;
            border-radius: 56px;
            max-width: 380px;
            width: 85%;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 30px 40px rgba(0,0,0,0.2);
        }
        .modal-word {
            font-size: 2rem;
            font-weight: bold;
            color: #b5476e;
            margin-bottom: 12px;
        }
        .modal-translation {
            font-size: 1.5rem;
            margin: 15px 0;
            background: #fdeff4;
            padding: 12px;
            border-radius: 50px;
        }
        .modal-example {
            font-style: italic;
            padding: 12px;
            background: #fef3e9;
            border-radius: 32px;
            margin: 15px 0;
            color: #5e3a48;
        }
        .close-modal {
            background: #b5476e;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 1rem;
            margin-top: 12px;
            cursor: pointer;
        }
        .reset-btn {
            background: none;
            border: 2px solid #f3a6bf;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: #b5476e;
            cursor: pointer;
            transition: 0.2s;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        @media (max-width: 720px) {
            .card { font-size: 1rem; padding: 8px 18px; min-width: 100px; }
            .category-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameApp">
    <div class="game-header">
        <h1 data-i18n="title">📚 Sort the Words</h1>
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="en">🇬🇧 EN</button>
            <button class="lang-btn" data-lang="ru">🇷🇺 RU</button>
        </div>
        <div class="score-area">⭐ <span id="scoreValue">0</span></div>
    </div>

    <!-- категории -->
    <div class="categories" id="categoriesContainer"></div>

    <!-- нераспределённые карточки -->
    <div class="cards-pool">
        <div class="pool-title" data-i18n="poolTitle">✨ Words to sort</div>
        <div class="cards-wrapper" id="cardsPool"></div>
    </div>

    <div class="footer">
        <button class="reset-btn" id="resetGameBtn" data-i18n="reset">⟳ Reset game</button>
        <span style="font-size:0.8rem; opacity:0.7;">💡 Drag & drop cards to categories</span>
    </div>
</div>

<!-- модальное окно для информации о слове -->
<div id="infoModal" class="modal">
    <div class="modal-card">
        <div class="modal-word" id="modalWord"></div>
        <div class="modal-translation" id="modalTranslation"></div>
        <div class="modal-example" id="modalExample"></div>
        <button class="close-modal" id="closeModalBtn">OK</button>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // Словарь: каждое слово принадлежит категории, есть перевод и пример
    const WORDS_DATA = [
        { word: "apple", category: "food", translation_ru: "яблоко", example_ru: "Я люблю есть яблоко каждый день.", example_en: "I love eating an apple every day." },
        { word: "pizza", category: "food", translation_ru: "пицца", example_ru: "Давай закажем пиццу на ужин.", example_en: "Let's order pizza for dinner." },
        { word: "cat", category: "animals", translation_ru: "кот", example_ru: "Мой кот спит на диване.", example_en: "My cat sleeps on the sofa." },
        { word: "dog", category: "animals", translation_ru: "собака", example_ru: "Собака — лучший друг человека.", example_en: "A dog is a man's best friend." },
        { word: "run", category: "actions", translation_ru: "бегать", example_ru: "Я люблю бегать по утрам.", example_en: "I like to run in the morning." },
        { word: "jump", category: "actions", translation_ru: "прыгать", example_ru: "Дети прыгают от радости.", example_en: "Children jump with joy." },
        { word: "happy", category: "emotions", translation_ru: "счастливый", example_ru: "Она была очень счастлива получить подарок.", example_en: "She was very happy to get a gift." },
        { word: "sad", category: "emotions", translation_ru: "грустный", example_ru: "Грустный фильм заставил меня плакать.", example_en: "The sad movie made me cry." },
        { word: "car", category: "transport", translation_ru: "машина", example_ru: "Это моя новая машина.", example_en: "This is my new car." },
        { word: "train", category: "transport", translation_ru: "поезд", example_ru: "Мы поедем на поезде в другой город.", example_en: "We will go by train to another city." }
    ];

    // Категории с заголовками (многоязычные)
    const CATEGORIES = [
        { id: "food", title_en: "🍕 Food", title_ru: "🍕 Еда" },
        { id: "animals", title_en: "🐾 Animals", title_ru: "🐾 Животные" },
        { id: "actions", title_en: "⚡ Actions", title_ru: "⚡ Действия" },
        { id: "emotions", title_en: "😊 Emotions", title_ru: "😊 Эмоции" },
        { id: "transport", title_en: "🚗 Transport", title_ru: "🚗 Транспорт" }
    ];

    // Тексты интерфейса (i18n)
    const I18N = {
        en: {
            title: "📚 Sort the Words",
            poolTitle: "✨ Words to sort",
            reset: "⟳ Reset game",
            score: "⭐ Score"
        },
        ru: {
            title: "📚 Сортируй слова",
            poolTitle: "✨ Слова для сортировки",
            reset: "⟳ Сбросить игру",
            score: "⭐ Очки"
        }
    };

    let currentLang = "en";   // en / ru
    let score = 0;
    // Структура: { wordData, categoryId, placed: true/false, placedInCategory }
    let gameWords = [];

    // Загружаем сохранение из localStorage
    function loadGame() {
        const saved = localStorage.getItem("wordSortGame");
        if (saved) {
            try {
                const data = JSON.parse(saved);
                score = data.score || 0;
                if (data.gameWords && Array.isArray(data.gameWords)) {
                    gameWords = data.gameWords;
                } else {
                    initGameWords();
                }
            } catch(e) { initGameWords(); }
        } else {
            initGameWords();
        }
        updateScoreUI();
        render();
    }

    function initGameWords() {
        gameWords = WORDS_DATA.map(w => ({
            wordData: w,
            categoryId: w.category,
            placed: false,
            placedInCategory: null
        }));
        // перемешаем начальный порядок
        shuffleArray(gameWords);
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    function saveGame() {
        const toSave = { score, gameWords };
        localStorage.setItem("wordSortGame", JSON.stringify(toSave));
    }

    function updateScoreUI() {
        document.getElementById("scoreValue").innerText = score;
    }

    // проверка правильности категории для слова
    function isCorrectCategory(wordItem, targetCategoryId) {
        return wordItem.wordData.category === targetCategoryId;
    }

    // переместить карточку в категорию (drag & drop)
    function placeWord(wordIndex, targetCategoryId) {
        const wordItem = gameWords[wordIndex];
        if (wordItem.placed) return false; // уже где-то есть
        if (!isCorrectCategory(wordItem, targetCategoryId)) {
            // Неправильная категория: показываем сообщение, не перемещаем (можно визуально)
            showTemporaryMessage("❌ Wrong category! Try again.", 1200);
            return false;
        }
        // правильное размещение
        wordItem.placed = true;
        wordItem.placedInCategory = targetCategoryId;
        score += 10;
        updateScoreUI();
        saveGame();
        render();
        showTemporaryMessage("✅ +10 points!", 800);
        return true;
    }

    // сброс всей игры
    function resetGame() {
        initGameWords();
        score = 0;
        updateScoreUI();
        saveGame();
        render();
        showTemporaryMessage("🔄 Game reset!", 1000);
    }

    // отображение плавающего сообщения
    let msgTimeout = null;
    function showTemporaryMessage(text, duration) {
        let msgDiv = document.getElementById("tempMsg");
        if (!msgDiv) {
            msgDiv = document.createElement("div");
            msgDiv.id = "tempMsg";
            msgDiv.style.position = "fixed";
            msgDiv.style.bottom = "30px";
            msgDiv.style.left = "50%";
            msgDiv.style.transform = "translateX(-50%)";
            msgDiv.style.backgroundColor = "#b5476e";
            msgDiv.style.color = "white";
            msgDiv.style.padding = "10px 24px";
            msgDiv.style.borderRadius = "60px";
            msgDiv.style.fontWeight = "bold";
            msgDiv.style.zIndex = "999";
            msgDiv.style.boxShadow = "0 4px 12px black";
            msgDiv.style.pointerEvents = "none";
            document.body.appendChild(msgDiv);
        }
        if (msgTimeout) clearTimeout(msgTimeout);
        msgDiv.innerText = text;
        msgDiv.style.opacity = "1";
        msgTimeout = setTimeout(() => {
            msgDiv.style.opacity = "0";
        }, duration);
    }

    // Показать модалку с информацией о слове
    function showWordInfo(wordData) {
        const modal = document.getElementById("infoModal");
        const modalWord = document.getElementById("modalWord");
        const modalTranslation = document.getElementById("modalTranslation");
        const modalExample = document.getElementById("modalExample");
        modalWord.innerText = wordData.word;
        if (currentLang === "ru") {
            modalTranslation.innerText = `📖 ${wordData.translation_ru}`;
            modalExample.innerText = `📌 ${wordData.example_ru}`;
        } else {
            modalTranslation.innerText = `📖 ${wordData.translation_ru}`; // всегда показываем русский перевод и пример на русском, но можно и на английском
            modalExample.innerText = `📌 ${wordData.example_en}`;
        }
        modal.style.display = "flex";
    }

    function closeModal() {
        document.getElementById("infoModal").style.display = "none";
    }

    // ---------- Drag & Drop логика (поддержка тач и мышь) ----------
    function setupDragAndDrop() {
        // категории - drop зоны
        const categoriesEl = document.querySelectorAll(".category");
        categoriesEl.forEach(cat => {
            cat.addEventListener("dragover", (e) => {
                e.preventDefault();
                cat.classList.add("drag-over");
            });
            cat.addEventListener("dragleave", () => {
                cat.classList.remove("drag-over");
            });
            cat.addEventListener("drop", (e) => {
                e.preventDefault();
                cat.classList.remove("drag-over");
                const wordIdx = e.dataTransfer.getData("text/plain");
                if (wordIdx !== null && !isNaN(parseInt(wordIdx))) {
                    const categoryId = cat.getAttribute("data-cat-id");
                    placeWord(parseInt(wordIdx), categoryId);
                }
            });
        });
        // для карточек - dragstart
        const cards = document.querySelectorAll(".card[draggable='true']");
        cards.forEach(card => {
            card.addEventListener("dragstart", (e) => {
                const idx = card.getAttribute("data-idx");
                e.dataTransfer.setData("text/plain", idx);
                e.dataTransfer.effectAllowed = "move";
                card.classList.add("dragging");
            });
            card.addEventListener("dragend", (e) => {
                card.classList.remove("dragging");
            });
        });
        // Поддержка touch: преобразуем в drag эмуляцию (для мобил)
        // более просто: сделаем через touchstart/touchmove/touchend для мобильных устройств
        // Для простоты добавим эмуляцию: при долгом нажатии? Но лучше добавить альтернативу: клик по карточке и потом клик по категории.
        // Для удобства добавим также метод "сначала выбрать карточку, потом категорию"
        let selectedCardIdx = null;
        const resetSelected = () => { selectedCardIdx = null; };
        // вешаем обработчики на карточки (клик для выбора)
        document.querySelectorAll(".card").forEach(card => {
            card.addEventListener("click", (e) => {
                // если клик на info-btn - не выбираем карточку
                if (e.target.classList.contains("info-btn")) return;
                const idx = card.getAttribute("data-idx");
                if (idx && !card.closest(".category-items")) { // только неразобранные
                    selectedCardIdx = parseInt(idx);
                    showTemporaryMessage(`👉 Click on a category to place "${gameWords[selectedCardIdx]?.wordData.word}"`, 1500);
                }
            });
        });
        // на категории клик для размещения выбранной карточки
        document.querySelectorAll(".category").forEach(cat => {
            cat.addEventListener("click", (e) => {
                if (selectedCardIdx !== null && !isNaN(selectedCardIdx)) {
                    const catId = cat.getAttribute("data-cat-id");
                    placeWord(selectedCardIdx, catId);
                    selectedCardIdx = null;
                }
            });
        });
        document.body.addEventListener("click", (e) => {
            if (!e.target.closest(".card") && !e.target.closest(".category")) selectedCardIdx = null;
        });
    }

    // отрисовка всего интерфейса
    function render() {
        const categoriesContainer = document.getElementById("categoriesContainer");
        const cardsPool = document.getElementById("cardsPool");
        // рендерим категории
        categoriesContainer.innerHTML = "";
        CATEGORIES.forEach(cat => {
            const catDiv = document.createElement("div");
            catDiv.className = "category";
            catDiv.setAttribute("data-cat-id", cat.id);
            const title = document.createElement("div");
            title.className = "category-title";
            title.innerText = currentLang === "en" ? cat.title_en : cat.title_ru;
            const itemsDiv = document.createElement("div");
            itemsDiv.className = "category-items";
            // заполняем размещённые слова
            const placedHere = gameWords.filter(w => w.placed && w.placedInCategory === cat.id);
            placedHere.forEach((w, idx) => {
                const placedSpan = document.createElement("div");
                placedSpan.className = "card-placed";
                placedSpan.innerHTML = `${w.wordData.word} <button class="info-btn" data-word='${JSON.stringify(w.wordData)}' style="background:#d9b7c4;">ⓘ</button>`;
                itemsDiv.appendChild(placedSpan);
            });
            catDiv.appendChild(title);
            catDiv.appendChild(itemsDiv);
            categoriesContainer.appendChild(catDiv);
        });
        // рендерим неразобранные карточки
        cardsPool.innerHTML = "";
        const unplaced = gameWords.filter(w => !w.placed);
        unplaced.forEach((w, idx) => {
            const originalIndex = gameWords.findIndex(gw => gw === w);
            const cardDiv = document.createElement("div");
            cardDiv.className = "card";
            cardDiv.setAttribute("draggable", "true");
            cardDiv.setAttribute("data-idx", originalIndex);
            cardDiv.innerHTML = `${w.wordData.word} <button class="info-btn" data-word='${JSON.stringify(w.wordData)}'>ⓘ</button>`;
            cardsPool.appendChild(cardDiv);
        });
        // обновляем i18n текстов интерфейса
        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.getAttribute("data-i18n");
            if (I18N[currentLang][key]) el.innerText = I18N[currentLang][key];
        });
        // переназначаем обработчики для info-btn и drag/drop
        attachInfoButtons();
        setupDragAndDrop(); // переустановка drag/drop
    }

    function attachInfoButtons() {
        document.querySelectorAll(".info-btn").forEach(btn => {
            btn.removeEventListener("click", handleInfoClick);
            btn.addEventListener("click", handleInfoClick);
        });
    }
    function handleInfoClick(e) {
        e.stopPropagation();
        const wordDataRaw = e.currentTarget.getAttribute("data-word");
        if (wordDataRaw) {
            const wordObj = JSON.parse(wordDataRaw);
            showWordInfo(wordObj);
        }
    }

    // Смена языка
    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll(".lang-btn").forEach(btn => {
            if (btn.getAttribute("data-lang") === lang) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        render();
    }

    // Инициализация после загрузки DOM
    document.addEventListener("DOMContentLoaded", () => {
        loadGame();
        // Языковые кнопки
        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const lang = e.currentTarget.getAttribute("data-lang");
                setLanguage(lang);
            });
        });
        document.getElementById("resetGameBtn").addEventListener("click", () => resetGame());
        document.getElementById("closeModalBtn").addEventListener("click", closeModal);
        window.addEventListener("click", (e) => {
            if (e.target === document.getElementById("infoModal")) closeModal();
        });
        setLanguage("en");
    });
</script>
</body>
</html>
